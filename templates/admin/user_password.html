{% extends 'admin/_base.html' %}
{% block title %}noncey — change password{% endblock %}
{% block content %}

<h1>Change password — {{ user.username }}</h1>

<form method="post" style="max-width: 480px;">
  <div class="field">
    <label for="password">New password</label>
    <input type="password" id="password" name="password" required autofocus
           autocomplete="new-password">
  </div>
  <div class="field">
    <label for="password2">Confirm new password</label>
    <input type="password" id="password2" name="password2" required
           autocomplete="new-password">
  </div>
  <p class="hint">All existing extension sessions for this user will be invalidated.</p>
  <input class="btn btn-primary" type="submit" value="Update password">
  <a class="btn" href="{{ url_for('admin.dashboard') }}">Cancel</a>
</form>

{% endblock %}
