<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}noncey{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      color: #222;
      margin: 0;
      background: #f8f8f8;
    }
    a { color: #0066cc; }
    nav {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.6rem 1.25rem;
      flex-wrap: wrap;
    }
    nav .brand { font-weight: 700; color: #fff; text-decoration: none; margin-right: 0.75rem; font-size: 1.05rem; }
    nav a { color: #ccc; text-decoration: none; padding: 0.3rem 0.65rem; border-radius: 3px; font-size: 0.875rem; }
    nav a:hover { color: #fff; background: rgba(255,255,255,.12); }
    nav .sep { color: #444; margin: 0 0.25rem; }
    nav .spacer { flex: 1; }
    nav .user-chip { color: #aaa; font-size: 0.82rem; margin-right: 0.5rem; }
    .page-wrap {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.25rem;
    }
    h1 { margin: 0 0 1.25rem; font-size: 1.4rem; }
    h2 { margin: 1.5rem 0 0.75rem; font-size: 1.1rem; }
    h3 { margin: 1.25rem 0 0.5rem; font-size: 1rem; }
    hr { border: none; border-top: 1px solid #ddd; margin: 1.75rem 0; }
    /* flash messages */
    .flash { padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .flash.info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    /* tables */
    table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; background: #fff; }
    th, td { border: 1px solid #ddd; padding: 0.45rem 0.75rem; text-align: left; vertical-align: top; }
    th { background: #f7f7f7; font-weight: 600; white-space: nowrap; }
    tr:hover td { background: #fafafa; }
    td.actions { white-space: nowrap; }
    td.actions a, td.actions button { margin-right: 0.4rem; }
    /* forms */
    .field { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
    input[type=text], input[type=email],
    input[type=password], input[type=number],
    textarea, select {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: inherit;
      font-family: inherit;
    }
    input[type=text]:focus, input[type=email]:focus,
    input[type=password]:focus, input[type=number]:focus,
    textarea:focus, select:focus {
      outline: 2px solid #0066cc;
      border-color: #0066cc;
    }
    textarea { height: 9rem; font-family: monospace; font-size: 0.85rem; resize: vertical; }
    .hint { font-size: 0.82rem; color: #666; margin: 0.2rem 0 0; }
    .btn {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: inherit;
      text-decoration: none;
      color: #222;
      font-family: inherit;
      line-height: 1.4;
    }
    .btn:hover { background: #e8e8e8; }
    .btn-primary { background: #0066cc; border-color: #0055aa; color: #fff; }
    .btn-primary:hover { background: #0055aa; }
    .btn-danger  { background: #c82333; border-color: #a71d2a; color: #fff; }
    .btn-danger:hover  { background: #a71d2a; }
    .btn-success { background: #28a745; border-color: #1e7e34; color: #fff; }
    .btn-success:hover { background: #1e7e34; }
    .btn-warning { background: #e6a817; border-color: #c89010; color: #111; }
    .btn-warning:hover { background: #c89010; }
    .btn:disabled { background: #e9ecef; border-color: #ccc; color: #999; cursor: not-allowed; }
    .btn:disabled:hover { background: #e9ecef; }
    form.inline { display: inline; }
    .empty { color: #888; font-style: italic; }
    code { font-family: monospace; background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
    /* status badges */
    .badge { display: inline-block; padding: 0.15em 0.55em; border-radius: 3px; font-size: 0.78rem; font-weight: 600; }
    .badge-incomplete { background: #e9ecef; color: #495057; }
    .badge-active  { background: #cce5ff; color: #004085; }
    .badge-tested  { background: #d4edda; color: #155724; }
    .badge-pending_review { background: #fff3cd; color: #856404; }
    .badge-public  { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>

{% if current_user %}
<nav>
  <a class="brand" href="{{ url_for('admin.dashboard') }}">noncey</a>
  <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
  <a href="{{ url_for('admin.marketplace_browse') }}">Marketplace</a>
  <a href="{{ url_for('admin.unmatched_list') }}">Unmatched</a>
  <a href="{{ url_for('admin.account_password') }}">Account</a>
  {% if user_is_admin %}
  <span class="sep">|</span>
  <a href="{{ url_for('admin.admin_users') }}">Users</a>
  <a href="{{ url_for('admin.admin_marketplace') }}">Review queue</a>
  {% endif %}
  <span class="spacer"></span>
  <span class="user-chip">{{ current_user.username }}</span>
  <form method="post" action="{{ url_for('admin.auth_logout') }}" class="inline">
    <button class="btn" type="submit" style="font-size:0.82rem;padding:0.25rem 0.6rem;">Log out</button>
  </form>
</nav>
{% endif %}

<div class="page-wrap">
  {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
