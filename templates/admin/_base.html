<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}noncey admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.25rem;
      color: #222;
    }
    a { color: #0066cc; }
    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #ddd;
      margin-bottom: 1.5rem;
    }
    nav .brand { font-weight: 600; color: #222; text-decoration: none; }
    h1 { margin: 0 0 1.25rem; font-size: 1.4rem; }
    h2 { margin: 1.5rem 0 0.75rem; font-size: 1.1rem; }
    h3 { margin: 1.25rem 0 0.5rem; font-size: 1rem; }
    hr { border: none; border-top: 1px solid #ddd; margin: 1.75rem 0; }
    /* flash messages */
    .flash { padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    /* tables */
    table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.45rem 0.75rem; text-align: left; vertical-align: top; }
    th { background: #f7f7f7; font-weight: 600; white-space: nowrap; }
    tr:hover td { background: #fafafa; }
    td.actions { white-space: nowrap; }
    td.actions a, td.actions button { margin-right: 0.5rem; }
    /* forms */
    .field { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
    input[type=text],
    input[type=password],
    textarea {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: inherit;
    }
    input[type=text]:focus,
    input[type=password]:focus,
    textarea:focus {
      outline: 2px solid #0066cc;
      border-color: #0066cc;
    }
    textarea { height: 9rem; font-family: monospace; font-size: 0.85rem; }
    .hint { font-size: 0.82rem; color: #666; margin: 0.2rem 0 0; }
    .btn {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: inherit;
      text-decoration: none;
      color: #222;
    }
    .btn:hover { background: #e8e8e8; }
    .btn-primary { background: #0066cc; border-color: #0055aa; color: #fff; }
    .btn-primary:hover { background: #0055aa; }
    .btn-danger  { background: #c82333; border-color: #a71d2a; color: #fff; }
    .btn-danger:hover  { background: #a71d2a; }
    /* inline form (for delete buttons in tables) */
    form.inline { display: inline; }
    .empty { color: #888; font-style: italic; }
    code { font-family: monospace; background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="{{ url_for('admin.dashboard') }}">noncey</a>
    <a href="{{ url_for('admin.dashboard') }}">Users</a>
    <a href="{{ url_for('admin.unmatched_list') }}">Unmatched</a>
  </nav>
  {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</body>
</html>
